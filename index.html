<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Tambak Monitoring</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<!-- LOGIN PAGE -->
<div id="loginPage" class="h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-lg w-80">
    <h2 class="text-xl font-bold mb-4 text-center">Login Admin</h2>
    <input id="username" class="w-full border p-2 mb-3 rounded" placeholder="Username">
    <input id="password" type="password" class="w-full border p-2 mb-3 rounded" placeholder="Password">
    <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
    <p id="loginError" class="text-red-500 text-sm mt-2"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<nav class="bg-blue-900 text-white p-4 flex justify-between">
  <h1 class="font-bold">Smart Tambak Monitoring</h1>
  <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">Logout</button>
</nav>

<div class="p-6 grid grid-cols-2 md:grid-cols-5 gap-4">

<div class="bg-yellow p-4 rounded shadow">
<p>Suhu</p><h2 id="val-suhu" class="text-xl font-bold">--</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>pH</p><h2 id="val-ph">--</h2>
</div>

<div class="bg-red p-4 rounded shadow">
<p>TDS</p><h2 id="val-tds">--</h2>
</div>

<div class="bg-green p-4 rounded shadow">
<p>TURBIDITY</p>h2 id="val-turbidity">--</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>DO</p><h2 id="val-do">--</h2>
</div>


<div class="bg-white p-4 rounded shadow">
<p>RSSI</p><h2 id="val-rssi">--</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>Delay</p><h2 id="val-delay">--</h2>
</div>

</div>

<div class="p-6">
<canvas id="chart"></canvas>
</div>

</div>

<script>
/* =========================
   LOGIN SYSTEM
========================= */

const ADMIN_USER = "admin";
const ADMIN_PASS = "12345";

function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === ADMIN_USER && pass === ADMIN_PASS){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
  } else {
    document.getElementById("loginError").innerText = "Username atau Password salah!";
  }
}

function logout(){
  location.reload();
}

/* =========================
   CHART
========================= */

const ctx = document.getElementById('chart').getContext('2d');
const waterChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Suhu',
      data: [],
      borderColor: 'blue'
    }]
  }
});

/* =========================
   WEBSOCKET NODE-RED
========================= */

const socket = new WebSocket("ws://localhost:1880/ws/data");

socket.onmessage = function(event){
  const data = JSON.parse(event.data);

  document.getElementById('val-suhu').innerText = data.suhu;
  document.getElementById('val-ph').innerText = data.ph;
  document.getElementById('val-do').innerText = data.do;
  document.getElementById('val-rssi').innerText = data.rssi;
  document.getElementById('val-delay').innerText = data.delay + " ms";

  updateChart(data.suhu);
  sendToGoogleSheets(data);
};

/* =========================
   UPDATE CHART
========================= */

function updateChart(value){
  let time = new Date().toLocaleTimeString();
  if(waterChart.data.labels.length > 15){
    waterChart.data.labels.shift();
    waterChart.data.datasets[0].data.shift();
  }
  waterChart.data.labels.push(time);
  waterChart.data.datasets[0].data.push(value);
  waterChart.update();
}

/* =========================
   EXPORT GOOGLE SHEETS
========================= */

const SHEETS_URL = "PASTE_URL_WEB_APP_KAMU_DISINI";

function sendToGoogleSheets(data){
  fetch(SHEETS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });
}

</script>
</body>
</html>
